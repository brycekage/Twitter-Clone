<html>
    <head>
        <title>Twitter Clone</title>
    </head>
    <body>
        <h1>Twitter Clone</h1>
        <ul>
            <li><a href='/'>Home</a></li>
            <!--  Jinja is a templating language
                everything by default is a string
                and the language specific commands have a specialty syntax
                There are no special commands to build strings
            -->
            {% if is_logged_in %}
            <li><a href='/logout'>Logout</a></li>
            <li><a href='/create message'>Create Message</a></li>
            <li><a href='/delete message'>Delete Message</a></li>                        
            {% else %}
            <li><a href='/login'>Login</a></li>
            <li><a href='/create user'>Create User</a></li>              
            {% endif %}                                                        
        </ul>
        {#
            This is a jinja2 comment
            anything in {% %} is jinja2 code
        #}
        {% block content %}
        {% endblock %}
    </body>
</html>
