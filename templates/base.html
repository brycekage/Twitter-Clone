<html>
    <head>
        <title>Twitter Clone</title>
        <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
    </head>
    <body>
        <h1>Twitter Clone</h1>
        <ul>
            <li><a href='/'>Home</a></li>
            <!--  Jinja is a templating language
                everything by default is a string
                and the language specific commands have a specialty syntax
                There are no special commands to build strings
            -->
            {% if is_logged_in %}
            <li><a href='/logout'>Logout</a></li>
            <li><a href='/create_message'>Create Message</a></li>
            {% else %}
            <li><a href='/login'>Login</a></li>
            <li><a href='/create_user'>Create User</a></li>
            {% endif %}
        </ul>
        {% block content %}
        {% endblock %}
    </body>
</html>
