<!DOCTYPE html>
<html>
<head>
    <title>Edit Twot</title>
    <style>
        body { background: #fdf6ee; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .edit-box { background: white; padding: 30px; border-radius: 20px; border: 2px solid #ddc9b0; width: 400px; }
        textarea { width: 100%; height: 100px; border: 1px solid #ddc9b0; border-radius: 10px; padding: 10px; margin: 10px 0; background: #f5ede0; color: #3a2e24; }
        .btn-pink { background: #7a5c3e; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="edit-box">
        <h2 style="color: #7a5c3e; margin-top: 0;">Edit Your Twot</h2>
        <form action="/edit_message/{{ message.id }}" method="post">
            <input type="hidden" name="csrf_token" value="{{ request.cookies.get('csrf_token') }}">
            <textarea name="content">{{ message.content }}</textarea>
            <button type="submit" class="btn-pink">Save Changes</button>
            <a href="/" style="color: #888; text-decoration: none; margin-left: 10px;">Cancel</a>
        </form>
    </div>
</body>
</html>
